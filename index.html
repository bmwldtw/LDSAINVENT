<style>

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  .logo-text{font-size:15px;font-weight:600;letter-spacing:0.08em;color:var(--text);display:block}
  .header-sub{font-size:11px;color:var(--gold);letter-spacing:0.08em;margin-top:3px;display:block}
  main{max-width:1200px;margin:0 auto;padding:1.5rem 1rem}
  .filter-group{margin-bottom:1rem}
  .filter-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tab{padding:5px 12px;border:1px solid var(--border2);border-radius:2px;background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all 0.15s}
  .tab:hover{color:var(--text);border-color:rgba(0,0,0,0.3);background:var(--surface)}
  .tab.active-y{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:500}
  .search-wrap{position:relative;margin-bottom:1rem}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3)}
  input[type=text]{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:2px;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:13px;padding:8px 12px 8px 36px;outline:none;transition:border-color 0.15s}
  input[type=text]:focus{border-color:var(--blue)}
  input[type=text]::placeholder{color:var(--text3)}
  .count{font-size:12px;color:var(--text3);margin-bottom:0.8rem}
  .count span{color:var(--blue);font-weight:500}
  .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:4px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead tr{border-bottom:1px solid var(--border2)}
  th{padding:10px 12px;text-align:left;font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);white-space:nowrap;background:var(--surface)}
  th.center{text-align:center}
  tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--surface2)}
  td{padding:10px 12px;vertical-align:middle;color:var(--text)}
  td.center{text-align:center}
  .yp{display:inline-block;padding:2px 7px;border-radius:2px;font-size:11px;font-weight:500;background:rgba(160,120,32,0.08);color:var(--gold);white-space:nowrap}
  .prod{display:block;font-size:10px;color:var(--text3);margin-top:3px;white-space:nowrap}
  .car-name{font-weight:500;font-size:13px;line-height:1.4}
  .car-price{font-size:12px;color:var(--text2);margin-top:3px;font-weight:400}
  .fin{color:var(--blue);font-size:12px;white-space:nowrap}
  .chk{color:#1a9640;font-size:15px}
  .dash{color:#ccc}
  .line-btn{position:fixed;bottom:20px;right:20px;background:#06C755;color:#fff;border:none;border-radius:50px;padding:10px 20px;font-size:13px;font-family:'Noto Sans TC',sans-serif;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 2px 12px rgba(6,199,85,0.4);z-index:999;text-decoration:none}
  .line-btn:hover{background:#05b34c}
  .ask-btn{display:inline-block;margin-top:6px;padding:3px 10px;background:#06C755;color:#fff;border-radius:4px;font-size:11px;font-weight:500;text-decoration:none;white-space:nowrap}
  .ask-btn:hover{background:#05b34c}
  @media(max-width:640px){
    main{padding:1rem 0.75rem}
    th,td{padding:8px 10px}
    .fin{font-size:11px}
  }
</style>
</head>
