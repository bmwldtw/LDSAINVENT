  .logo-text{font-size:14px;font-weight:500;letter-spacing:0.1em;color:var(--text)}
  .header-tag{font-size:11px;letter-spacing:0.1em;color:var(--gold);background:rgba(160,120,32,0.08);border:1px solid rgba(160,120,32,0.25);padding:4px 12px;border-radius:2px}

  .page-sub{font-size:12px;color:var(--text3);letter-spacing:0.05em;margin-bottom:2rem}
  .filter-group{margin-bottom:1rem}
  .filter-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tab{padding:5px 12px;border:1px solid var(--border2);border-radius:2px;background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all 0.15s}
  .tab:hover{color:var(--text);border-color:rgba(0,0,0,0.3);background:var(--surface)}
  .tab.active-s{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:500}
  .tab.active-y{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:500}
  .search-wrap{position:relative;margin-bottom:1rem}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3)}
  input[type=text]{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:2px;color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:13px;padding:8px 12px 8px 36px;outline:none;transition:border-color 0.15s}
  input[type=text]:focus{border-color:var(--blue)}
  input[type=text]::placeholder{color:var(--text3)}
  .count{font-size:12px;color:var(--text3);margin-bottom:0.8rem}
  .count span{color:var(--blue);font-weight:500}
  .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:4px}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:800px}
  thead tr{border-bottom:1px solid var(--border2)}
  th{padding:10px 14px;text-align:left;font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);white-space:nowrap;background:var(--surface)}
  th.center{text-align:center}
  tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--surface2)}
  td{padding:10px 14px;vertical-align:middle;color:var(--text)}
  td.center{text-align:center}
  .sp{display:inline-block;padding:2px 7px;border-radius:2px;font-size:10px;font-weight:500;letter-spacing:0.08em}
  .p1{background:rgba(27,111,255,0.1);color:#1b6fff}
  .p2{background:rgba(0,160,130,0.1);color:#008c72}

  .p7{background:rgba(140,100,20,0.12);color:#8c6414}

  .pM{background:rgba(200,30,30,0.1);color:#c01e1e}
  .pi{background:rgba(0,140,200,0.1);color:#008cc8}
  .yp{display:inline-block;padding:2px 7px;border-radius:2px;font-size:11px;font-weight:500;background:rgba(160,120,32,0.08);color:var(--gold);white-space:nowrap}
  .prod{display:block;font-size:10px;color:var(--text3);margin-top:3px;white-space:nowrap}
  .car-name{font-weight:400}
  .price{font-weight:500;white-space:nowrap}
  .fin{color:var(--blue);font-size:12px}
  .chk{color:#1a9640;font-size:15px}
  .dash{color:#ccc}
  .note{font-size:11px;color:var(--text2);max-width:200px;line-height:1.5}
  footer{text-align:center;padding:2rem;border-top:1px solid var(--border);margin-top:3rem;font-size:11px;color:var(--text3)}
  @media(max-width:640px){header{padding:1rem 1.2rem}main{padding:1rem 1.2rem}.page-title{font-size:1.3rem}}
</style>
</head>

</main>

var pc = {"1":"p1","2":"p2","3":"p3","4":"p4","5":"p5","7":"p7","X":"pX","M":"pM","i":"pi"};
var sl = {"1":"1系列","2":"2系列","3":"3系列","4":"4系列","5":"5系列","7":"7系列","X":"X系列","M":"M","i":"電動車"};
var curS = "", curY = "";
document.getElementById('stabs').addEventListener('click', function(e) {
  if (!e.target.classList.contains('tab')) return;
  document.querySelectorAll('#stabs .tab').forEach(function(t){t.classList.remove('active-s')});
  e.target.classList.add('active-s');
  curS = e.target.getAttribute('data-s');
  render();
});
document.getElementById('ytabs').addEventListener('click', function(e) {
  if (!e.target.classList.contains('tab')) return;
  document.querySelectorAll('#ytabs .tab').forEach(function(t){t.classList.remove('active-y')});
  e.target.classList.add('active-y');
  curY = e.target.getAttribute('data-y');
  render();
});
function render() {
  var q = document.getElementById('search').value.toLowerCase();
  var tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  var count = 0;
  data.forEach(function(r) {
    if (curS && r.s !== curS) return;
    if (curY && r.y !== curY) return;
    if (q && r.m.toLowerCase().indexOf(q) === -1) return;
    count++;
    var tr = document.createElement('tr');
    var pclass = pc[r.s] || '';
    tr.innerHTML =
      '<td><span class="sp '+pclass+'">'+(sl[r.s]||r.s)+'</span></td>' +
      '<td><span class="yp">'+r.y+'</span><span class="prod">('+r.pd+')</span></td>' +
      '<td class="car-name">'+r.m+'</td>' +
      '<td class="price">NT$'+r.p.toLocaleString()+'</td>' +
      '<td class="fin">'+r.f+'</td>' +
      '<td class="center">'+(r.ins?'<span class="chk">✓</span>':'<span class="dash">–</span>')+'</td>' +
      '<td class="center">'+(r.mnt?'<span class="chk">✓</span>':'<span class="dash">–</span>')+'</td>' +
      '<td class="center">'+(r.ext?'<span class="chk">✓</span>':'<span class="dash">–</span>')+'</td>';
    tbody.appendChild(tr);
  });
  document.getElementById('count').innerHTML = '共 <span>'+count+'</span> 筆資料';
}
