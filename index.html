    font-family: 'BMWTypeNext';

    font-display: swap;
  }
  @font-face {
    font-family: 'BMWTypeNext';
    src: url('fonts/BMWTypeNext-Bold.otf') format('opentype');
    font-weight: 700;
    font-display: swap;
  }
  @font-face {
    font-family: 'WenDing';

    font-weight: 300;
    font-display: swap;
  }
  @font-face {
    font-family: 'WenDing';

    font-weight: 700;
    font-display: swap;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#ffffff;--surface:#f5f5f5;--surface2:#eeeeee;--border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);--text:#111111;--text2:#555555;--text3:#999999;--blue:#1b6fff;--gold:#a07820}
  body{background:var(--bg);color:var(--text);font-family:'BMWTypeNext','WenDing',sans-serif;font-weight:300;min-height:100vh}
  header{border-bottom:1px solid var(--border);padding:1.2rem 1.5rem;position:sticky;top:0;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);z-index:100}
  .logo-text{font-size:15px;font-weight:600;letter-spacing:0.08em;color:var(--text);display:block}
  .header-sub{font-size:11px;color:var(--gold);letter-spacing:0.08em;margin-top:3px;display:block}
  .tab.tab-presale{border-color:#e65c00;color:#e65c00}
  .tab.tab-presale:hover{background:rgba(230,92,0,0.08)}
  .tab.tab-presale.active-y{background:#e65c00;border-color:#e65c00;color:#fff}
  .presale-badge{display:inline-block;background:#e65c00;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;margin-right:6px;letter-spacing:0.05em;vertical-align:middle}
  /* 試駕卡片 */
  .promo-card{display:block;background:linear-gradient(135deg,#0a1f4e 0%,#1b4fff 60%,#0066cc 100%);color:#fff;text-decoration:none;padding:1.2rem 1.5rem;margin-bottom:1.5rem;border-radius:8px;display:flex;align-items:center;justify-content:space-between;gap:1rem;box-shadow:0 4px 20px rgba(27,79,255,0.3);transition:transform 0.15s,box-shadow 0.15s;overflow:hidden;position:relative}
  .promo-card::before{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;background:rgba(255,255,255,0.05);border-radius:50%}
  .promo-card::after{content:"";position:absolute;right:40px;bottom:-50px;width:120px;height:120px;background:rgba(255,255,255,0.04);border-radius:50%}
  .promo-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(27,79,255,0.4)}
  .promo-card-left{position:relative;z-index:1}
  .promo-card-tag{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;opacity:0.75;margin-bottom:6px}
  .promo-card-title{font-size:18px;font-weight:600;letter-spacing:0.02em;margin-bottom:4px}
  .promo-card-sub{font-size:12px;opacity:0.8}
  .promo-card-btn{position:relative;z-index:1;background:#fff;color:#1b4fff;font-size:13px;font-weight:700;padding:10px 22px;border-radius:50px;white-space:nowrap;letter-spacing:0.04em;flex-shrink:0;transition:background 0.15s}
  .promo-card:hover .promo-card-btn{background:#f0f4ff}
  /* 浮動按鈕 */
  .float-btn{position:fixed;bottom:24px;right:20px;background:linear-gradient(135deg,#1b4fff,#0066cc);color:#fff;text-decoration:none;border-radius:50px;padding:12px 20px;font-size:13px;font-weight:600;font-family:'BMWTypeNext','WenDing',sans-serif;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(27,79,255,0.45);z-index:999;transition:transform 0.15s,box-shadow 0.15s;letter-spacing:0.03em}
  .float-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(27,79,255,0.55)}
  .float-btn svg{flex-shrink:0}
  main{max-width:1200px;margin:0 auto;padding:1.5rem 1rem}
  .filter-group{margin-bottom:1rem}
  .filter-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tab{padding:5px 12px;border:1px solid var(--border2);border-radius:2px;background:transparent;color:var(--text2);font-size:12px;font-family:'BMWTypeNext','WenDing',sans-serif;cursor:pointer;transition:all 0.15s}
  .tab:hover{color:var(--text);border-color:rgba(0,0,0,0.3);background:var(--surface)}
  .tab.active-y{background:var(--gold);border-color:var(--gold);color:#fff;font-weight:500}
  .search-wrap{position:relative;margin-bottom:1rem}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3)}
  input[type=text]{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:2px;color:var(--text);font-family:'BMWTypeNext','WenDing',sans-serif;font-size:13px;padding:8px 12px 8px 36px;outline:none;transition:border-color 0.15s}
  input[type=text]:focus{border-color:var(--blue)}
  input[type=text]::placeholder{color:var(--text3)}
  .count{font-size:12px;color:var(--text3);margin-bottom:0.8rem}
  .count span{color:var(--blue);font-weight:500}
  .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:4px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead tr{border-bottom:1px solid var(--border2)}
  th{padding:10px 12px;text-align:left;font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);white-space:nowrap;background:var(--surface)}
  th.center{text-align:center}
  tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--surface2)}
  td{padding:10px 12px;vertical-align:middle;color:var(--text)}
  td.center{text-align:center}
  .yp{display:inline-block;padding:2px 7px;border-radius:2px;font-size:11px;font-weight:500;background:rgba(160,120,32,0.08);color:var(--gold);white-space:nowrap}
  .prod{display:block;font-size:10px;color:var(--text3);margin-top:3px;white-space:nowrap}
  .car-name{font-weight:500;font-size:13px;line-height:1.4}
  .car-price{font-size:12px;color:var(--text2);margin-top:3px;font-weight:400}
  .fin{color:var(--blue);font-size:12px;white-space:nowrap}
  .gift-btn{display:inline-block;padding:4px 12px;background:var(--blue);color:#fff;border-radius:4px;font-size:12px;font-weight:500;border:none;cursor:pointer;font-family:'BMWTypeNext','WenDing',sans-serif;white-space:nowrap}
  .gift-btn:hover{background:#1459d4}
  .gift-btn.no-gift{background:var(--surface2);color:var(--text3);cursor:default}
  .gift-btn.no-gift:hover{background:var(--surface2)}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;align-items:center;justify-content:center}
  .modal-overlay.show{display:flex}
  .modal{background:#fff;border-radius:12px;padding:1.5rem;max-width:340px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.18)}
  .modal-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
  .modal-sub{font-size:11px;color:var(--text3);margin-bottom:1.2rem}
  .modal-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
  .modal-item:last-child{border-bottom:none}
  .modal-icon{font-size:18px;width:28px;text-align:center}
  .modal-label{font-size:13px;color:var(--text);font-weight:400}
  .modal-val{margin-left:auto;font-size:13px;font-weight:500}
  .modal-val.yes{color:#1a9640}
  .modal-val.no{color:#ccc}
  .modal-close{margin-top:1.2rem;width:100%;padding:10px;background:var(--surface);border:none;border-radius:6px;font-size:13px;font-family:'BMWTypeNext','WenDing',sans-serif;cursor:pointer;color:var(--text2)}
  .modal-close:hover{background:var(--surface2)}
  footer{text-align:center;padding:2rem;border-top:1px solid var(--border);margin-top:3rem;font-size:11px;color:var(--text3)}
  @media(max-width:640px){main{padding:1rem 0.75rem}th,td{padding:8px 10px}.fin{font-size:11px}}
</style>
</head>

var curY = "正2026";
document.getElementById('ytabs').addEventListener('click', function(e) {
  if (!e.target.classList.contains('tab')) return;
  document.querySelectorAll('#ytabs .tab').forEach(function(t){t.classList.remove('active-y')});
  e.target.classList.add('active-y');
  curY = e.target.getAttribute('data-y');
  render();
});
function showGift(ins,mnt,ext,name,fin) {
  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modalSub').textContent = '分期方案：' + fin;
  var iEl=document.getElementById('m-ins');
  var mEl=document.getElementById('m-mnt');
  var eEl=document.getElementById('m-ext');
  iEl.textContent=ins?'✓ 贈送':'–'; iEl.className='modal-val '+(ins?'yes':'no');
  mEl.textContent=mnt?'✓ 贈送':'–'; mEl.className='modal-val '+(mnt?'yes':'no');
  eEl.textContent=ext?'✓ 贈送':'–'; eEl.className='modal-val '+(ext?'yes':'no');
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(e) {
  if (e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('show');
}
function render() {
  var q=document.getElementById('search').value.toLowerCase();
  var tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  var count=0;
  data.forEach(function(r) {
    if (curY && r.y!==curY) return;
    if (q && r.m.toLowerCase().indexOf(q)===-1) return;
    count++;
    var tr=document.createElement('tr');
    var finText=r.f==='--'?'--':r.f.replace(/(\d+)\/(\d+)/,'$1萬/$2期');
    var hasGift=r.ins||r.mnt||r.ext;
    var giftLabel=hasGift?'🎁 贈送項目':'尚無贈送項目';
    var ypClass = r.y === '預售' ? ' style="background:rgba(230,92,0,0.1);color:#e65c00"' : '';
    var pdLabel = r.y === '預售' ? '<span class="presale-badge">預售</span>' : '';
    tr.innerHTML=
      '<td><span class="yp"'+ypClass+'>'+r.y+'</span><span class="prod">('+r.pd+')</span></td>'+
      '<td><div class="car-name">'+pdLabel+r.m+'</div><div class="car-price">NT$'+r.p.toLocaleString()+(r.y==='預售'?' <span style="font-size:10px;color:#e65c00">參考售價</span>':'')+'</div></td>'+
      '<td class="fin">'+finText+'</td>'+
      '<td class="center"><button class="gift-btn'+(hasGift?'':' no-gift')+'"'+(hasGift?' onclick="showGift('+r.ins+','+r.mnt+','+r.ext+',\''+r.m.replace(/'/g,"\\'")+' ('+r.y+')\',\''+finText+'\')"':'')+'>'+giftLabel+'</button></td>';
    tbody.appendChild(tr);
  });
  document.getElementById('count').innerHTML='共 <span>'+count+'</span> 筆資料';
}
render();
