  :root {

  body {

    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 2rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
  }

  .logo-text {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text2);
  }

  .header-tag {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--gold);
    background: var(--gold-dim);
    border: 1px solid rgba(200,168,75,0.2);
    padding: 4px 12px;
    border-radius: 2px;
    font-weight: 400;
  }

  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2.5rem 2.5rem;
  }

  .page-title {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .page-sub {
    font-size: 13px;
    color: var(--text3);
    letter-spacing: 0.05em;
    margin-bottom: 2.5rem;
  }

  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
    align-items: center;
  }

  .series-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 6px 14px;
    border: 1px solid var(--border2);
    border-radius: 2px;
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tab:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }

  .tab.active {
    background: var(--blue);
    border-color: var(--blue);
    color: #fff;
    font-weight: 500;
  }

  .search-wrap {
    flex: 1;
    min-width: 220px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
  }

  input[type=text] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 13px;
    padding: 8px 12px 8px 36px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type=text]:focus { border-color: var(--blue); }
  input[type=text]::placeholder { color: var(--text3); }

  .result-count {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.05em;
    margin-bottom: 1rem;
  }

  .result-count span { color: var(--blue); font-weight: 500; }

  .table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 900px;
  }

  thead tr {
    border-bottom: 1px solid var(--border2);
  }

  th {
    padding: 12px 16px;
    text-align: left;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    white-space: nowrap;
    background: var(--surface);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 12px 16px;
    vertical-align: middle;
    color: var(--text);
  }

  .series-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 2px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;

  .pill-1 { background: rgba(100,160,255,0.15); color: #64a0ff; }
  .pill-2 { background: rgba(100,200,180,0.15); color: #64c8b4; }
  .pill-3 { background: rgba(200,168,75,0.15); color: var(--gold); }
  .pill-4 { background: rgba(255,120,80,0.15); color: #ff7850; }
  .pill-5 { background: rgba(150,100,255,0.15); color: #9664ff; }
  .pill-7 { background: rgba(200,168,75,0.2); color: #e0c060; }
  .pill-X { background: rgba(80,200,120,0.15); color: #50c878; }
  .pill-M { background: rgba(255,50,50,0.15); color: #ff5050; }
  .pill-i { background: rgba(0,200,255,0.12); color: #00c8ff; }

  .car-name { font-weight: 400; color: var(--text); }

  .price-cell { font-weight: 500; color: var(--text); white-space: nowrap; }

  .benefit { color: #50c878; font-size: 12px; white-space: nowrap; }
  .benefit.none { color: var(--text3); }

  .note-cell { font-size: 11px; color: var(--text2); max-width: 220px; line-height: 1.5; }

  .financing { color: var(--blue); font-size: 12px; }

    text-align: center;
    padding: 2rem;
    border-top: 1px solid var(--border);
    margin-top: 4rem;
    font-size: 11px;
    color: var(--text3);

  .year-label {

const pillClass = {
  "1":"pill-1","2":"pill-2","3":"pill-3","4":"pill-4",
  "5":"pill-5","7":"pill-7","X":"pill-X","M":"pill-M","i":"pill-i"
};
const seriesLabel = {
  "1":"1 Series","2":"2 Series","3":"3 Series","4":"4 Series",
  "5":"5 Series","7":"7 Series","X":"X Series","M":"M","i":"Electric"
};

let activeSeries = "";
let activeYear = "";

document.getElementById('tabs').addEventListener('click', e => {
  if (!e.target.classList.contains('tab')) return;
  document.querySelectorAll('#tabs .tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  activeSeries = e.target.dataset.s;
  render();
});

document.getElementById('yearTabs').addEventListener('click', e => {
  if (!e.target.classList.contains('tab')) return;
  document.querySelectorAll('#yearTabs .tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  activeYear = e.target.dataset.y;
  render();
});

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let count = 0;

  data.forEach(r => {
    if (activeSeries && r.s !== activeSeries) return;
    if (activeYear && r.y !== activeYear) return;
    if (q && !r.m.toLowerCase().includes(q)) return;
    count++;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="series-pill ${pillClass[r.s]||''}">${seriesLabel[r.s]||r.s}</span></td>
      <td><span class="year-pill">${r.y}</span></td>
      <td class="car-name">${r.m}</td>
      <td class="price-cell">NT$${r.p.toLocaleString()}</td>
      <td class="financing">${r.f}</td>
      <td>${r.d ? '<span class="benefit">NT$'+r.d.toLocaleString()+'</span>' : '<span class="benefit none">–</span>'}</td>
      <td>${r.i ? '<span class="benefit">NT$'+r.i+'</span>' : '<span class="benefit none">–</span>'}</td>
      <td>${r.a ? '<span class="benefit">NT$'+r.a+'</span>' : '<span class="benefit none">–</span>'}</td>
      <td>${r.g ? '<span class="benefit">NT$'+r.g+'</span>' : '<span class="benefit none">–</span>'}</td>
      <td class="note-cell">${r.n||''}</td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('count').innerHTML = `共 <span>${count}</span> 筆資料`;
}
